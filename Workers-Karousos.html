<!DOCTYPE html>
<html>
<head>
  <title>Waiter System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background:#f4f6f9; padding:15px; }
    .card { background:white; padding:15px; border-radius:12px; margin-bottom:12px; box-shadow:0 3px 8px rgba(0,0,0,0.1); }
    h2 { text-align:center; cursor:pointer; }

    .row {
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #eee;
    }

    input[type="text"] {
      border:none;
      width:70%;
      font-size:16px;
      background:transparent;
    }

    input[type="checkbox"] { transform:scale(1.3); }

    button {
      width:100%;
      padding:12px;
      margin-top:6px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn1{background:#28a745;color:white;}
    .btn2{background:#007bff;color:white;}
    .btn3{background:#6f42c1;color:white;}
    .btn4{background:#ffc107;}
  </style>
</head>

<body>

<div class="card">
  <h2 id="dateTitle"></h2>
</div>

<div class="card" id="list"></div>

<div class="card">
  <button class="btn1" id="saveBtn">Save</button>
  <button class="btn2" id="settingsBtn">Settings</button>
  <button class="btn3" id="monthlyBtn">Monthly Report</button>
  <button class="btn4" id="pastBtn">Previous Saves</button>
</div>

<div class="card" id="settings"></div>
<div class="card" id="past"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqp_twy2X4lxTrKsMrB3EIs8DYzlVfJ-8",
  authDomain: "workers-27d2f.firebaseapp.com",
  projectId: "workers-27d2f",
  storageBucket: "workers-27d2f.firebasestorage.app",
  messagingSenderId: "641573810840",
  appId: "1:641573810840:web:94e3bb0fb775c2168d96ed"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// DATE
let today = new Date().toISOString().slice(0,10);
document.getElementById("dateTitle").innerText = today;

// NAMES
let waiterNames = JSON.parse(localStorage.getItem("names")) || [
  "John","Mike","Anna","Chris","Maria",
  "George","Nick","Sofia","Peter","Helen"
];

// RENDER LIST
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  waiterNames.forEach((n,i)=>{
    if(n.trim() === "") return; // 🔥 hide empty names

    list.innerHTML += `
      <div class="row">
        <input type="text" value="${n}" id="n${i}">
        <input type="checkbox" id="c${i}">
      </div>
    `;
  });
}

// SAVE
async function saveData() {
  let data = [];

  waiterNames.forEach((_,i)=>{
    const nameEl = document.getElementById("n"+i);
    if(!nameEl) return;

    const name = nameEl.value.trim();
    const worked = document.getElementById("c"+i).checked;

    if(name !== ""){
      data.push({name, worked});
      waiterNames[i] = name;
    }
  });

  localStorage.setItem("names", JSON.stringify(waiterNames));

  await setDoc(doc(db,"days",today), {
    date: today,
    data: data
  });

  alert("Saved ✅");
}

// SETTINGS
function openSettings(){
  let html = "<h3>Edit Names</h3>";

  waiterNames.forEach((n,i)=>{
    html += `<input id="s${i}" value="${n}" placeholder="Empty = hidden"><br>`;
  });

  html += `<button onclick="window.saveNames()">Save Names</button>`;
  document.getElementById("settings").innerHTML = html;
}

window.saveNames = function(){
  waiterNames = waiterNames.map((_,i)=>document.getElementById("s"+i).value.trim());
  localStorage.setItem("names", JSON.stringify(waiterNames));
  render();
  alert("Updated ✅");
};

// PREVIOUS
async function viewPast(){
  const snap = await getDocs(collection(db,"days"));

  let html = "<h3>Previous Saves</h3>";

  snap.forEach(d=>{
    html += `<button onclick="window.openDay('${d.id}')">${d.id}</button><br>`;
  });

  document.getElementById("past").innerHTML = html;
}

window.openDay = async function(date){
  const snap = await getDoc(doc(db,"days",date));
  const d = snap.data();

  let html = `<h3>${date}</h3>`;

  d.data.forEach(w=>{
    html += `<p>${w.name} - ${w.worked ? "Worked":"Absent"}</p>`;
  });

  document.getElementById("past").innerHTML = html;
};

// MONTHLY
async function monthlyReport(){
  const snap = await getDocs(collection(db,"days"));
  let counts = {};
  let now = new Date();

  snap.forEach(d=>{
    let data = d.data();
    let date = new Date(data.date);

    if(date.getMonth() === now.getMonth()){
      data.data.forEach(w=>{
        if(w.worked){
          counts[w.name] = (counts[w.name]||0)+1;
        }
      });
    }
  });

  let html = `<h2>Monthly Report</h2>`;

  for(let n in counts){
    html += `<p>${n}: ${counts[n]} days</p>`;
  }

  let win = window.open();
  win.document.write(html);
  win.print();
}

// BUTTON EVENTS (FIXED 🔥)
document.getElementById("saveBtn").onclick = saveData;
document.getElementById("settingsBtn").onclick = openSettings;
document.getElementById("monthlyBtn").onclick = monthlyReport;
document.getElementById("pastBtn").onclick = viewPast;

// START
render();

</script>

</body>
</html>
